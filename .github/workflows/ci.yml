name: Stage 2 DevOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker

  test:
  runs-on: ubuntu-latest
  needs: lint

  steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install pytest
        pip install fastapi uvicorn redis httpx

    - name: Run tests
      run: PYTHONPATH=. pytest

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend

          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:latest ./api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:latest
          format: table
          exit-code: 1
          severity: CRITICAL

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create env file
        run: |
          echo API_PORT=8000 >> .env
          echo FRONTEND_PORT=3000 >> .env
          echo REDIS_HOST=redis >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..15}; do
            if curl -s http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Test job flow
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)

          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi

            sleep 2
          done

          exit 1

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy complete
        run: echo "Deployment successful"