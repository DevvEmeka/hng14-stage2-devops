  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} -t api:latest ./api

      - name: Build Worker image
        run: |
          docker build -t worker:${{ github.sha }} -t worker:latest ./worker

      - name: Build Frontend image
        run: |
          docker build -t frontend:${{ github.sha }} -t frontend:latest ./frontend