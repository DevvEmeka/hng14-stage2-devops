name: Stage 2 DevOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Install eslint
        run: |
          cd frontend
          npm install eslint --save-dev

      - name: Run JS lint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint

      - name: Lint Dockerfiles
        run: |
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install pytest pytest-cov fastapi uvicorn redis httpx

      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}

          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:latest

  security:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - uses: actions/checkout@v4

    - name: Build API image
      run: docker build -t hng14-stage2-devops-api:latest ./api

    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: hng14-stage2-devops-api:latest
        format: table
        exit-code: 1
        severity: CRITICAL

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo API_PORT=8000 >> .env
          echo FRONTEND_PORT=3000 >> .env
          echo REDIS_HOST=redis >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait
        run: sleep 20

      - name: Test API
        run: curl -f http://localhost:8000

      - name: Shutdown
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy
        run: echo "Rolling update successful"