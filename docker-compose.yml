services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  api:
    build: ./api
    ports:
      - "${API_PORT}:8000"
    environment:
      REDIS_HOST: ${REDIS_HOST}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  worker:
    build: ./worker
    environment:
      REDIS_HOST: ${REDIS_HOST}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "python", "-c", "print('healthy')"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  appnet:
    driver: bridge