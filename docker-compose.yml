services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    ports:
      - "${API_PORT}:8000"
    environment:
      REDIS_HOST: ${REDIS_HOST}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: ./worker
    environment:
      REDIS_HOST: ${REDIS_HOST}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "python", "-c", "print('healthy')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  appnet:
    driver: bridge